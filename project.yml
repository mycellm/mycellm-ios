name: Mycellm
options:
  bundleIdPrefix: com.mycellm
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: false
    GENERATE_INFOPLIST_FILE: true

packages:
  SwiftCBOR:
    url: https://github.com/valpackett/SwiftCBOR.git
    from: "0.4.7"
  Hummingbird:
    url: https://github.com/hummingbird-project/hummingbird.git
    from: "2.0.0"
  swift-crypto:
    url: https://github.com/apple/swift-crypto.git
    from: "3.0.0"

targets:
  Mycellm:
    type: application
    platform: iOS
    sources:
      - path: Mycellm
        excludes:
          - Tests/**
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mycellm.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_FILE: Mycellm/Info.plist
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Mycellm uses the local network to serve inference and connect to peers."
        INFOPLIST_KEY_NSBonjourServices: "_mycellm._tcp"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: DCMLXQ5H7M
    dependencies:
      - package: SwiftCBOR
      - package: Hummingbird
      - package: swift-crypto
        product: Crypto

  MycellmTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Mycellm/Tests
    dependencies:
      - target: Mycellm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mycellm.app.tests
