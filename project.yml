name: Mycellm
options:
  bundleIdPrefix: com.mycellm
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: false

packages:
  SwiftCBOR:
    url: https://github.com/valpackett/SwiftCBOR.git
    from: "0.4.7"
  Hummingbird:
    url: https://github.com/hummingbird-project/hummingbird.git
    from: "2.0.0"
  llama:
    url: https://github.com/mattt/llama.swift.git
    from: "2.8470.0"

targets:
  Mycellm:
    type: application
    platform: iOS
    sources:
      - path: Mycellm
        excludes:
          - Tests/**
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mycellm.app
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: Mycellm/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: DCMLXQ5H7M
    dependencies:
      - package: SwiftCBOR
      - package: Hummingbird
      - package: llama
        product: LlamaSwift

  MycellmTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Mycellm/Tests
    dependencies:
      - target: Mycellm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mycellm.app.tests
